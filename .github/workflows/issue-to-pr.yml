name: Location submission to PR

# When someone files an "Add a location" issue (via the map's pin flow or the
# issue form), parse it, append the place to tools/extra_locations.json,
# regenerate points.geojson, and open a PR automatically. The maintainer just
# reviews the pin on the map and merges.
on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: location-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  submit:
    if: contains(github.event.issue.labels.*.name, 'new-location')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Parse issue and append location
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python3 tools/issue_to_location.py

      - name: Regenerate points.geojson
        run: python3 tools/generate_geojson.py

      - name: Open a PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'data: add location from #${{ github.event.issue.number }}'
          title: 'Add location from #${{ github.event.issue.number }}'
          body: |
            Closes #${{ github.event.issue.number }}

            Adds a community-submitted location to `tools/extra_locations.json`
            and regenerates `points.geojson`. Check the pin's position on the
            map before merging.
          branch: 'auto/location-${{ github.event.issue.number }}'
          delete-branch: true
          add-paths: |
            tools/extra_locations.json
            points.geojson

      - name: Comment failure on the issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Sorry - I couldn't process this submission automatically. " +
                    "Please check the **Place name** and **Coordinates (lat,lon)** " +
                    "fields (coordinates must be decimal degrees inside Berlin, e.g. " +
                    "`52.520000,13.405000`). See the [workflow run](" +
                    context.serverUrl + "/" + context.repo.owner + "/" + context.repo.repo +
                    "/actions/runs/" + context.runId + ") for details."
            })
